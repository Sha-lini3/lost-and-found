<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard - Lost and Found</title>
    <link rel="stylesheet" href="../css/admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <div class="dashboard-info">
        <div class="info-card">
          <h3 id="totalReports">0</h3>
          <p>Total Reports</p>
        </div>

        <div class="info-card">
          <h3 id="lostReports">0</h3>
          <p>Lost Items</p>
        </div>

        <div class="info-card">
          <h3 id="foundReports">0</h3>
          <p>Found Items</p>
        </div>
      </div>
      <h1>Admin Dashboard</h1>
      <p>Manage user-submitted reports and view uploaded images</p>
    </header>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search Item..." />

      <select id="filterType">
        <option value="All">All Reports</option>

        <option value="Lost">Lost</option>

        <option value="Found">Found</option>
      </select>
    </div>
    <section class="table-section">
      <h2>All Reports</h2>
      <table id="reportsTable">
        <thead>
          <tr>
            <th>Type</th>

            <th>Item</th>

            <th>Description</th>

            <th>Location</th>

            <th>Status</th>

            <th>Image</th>

            <th>Manage</th>
          </tr>
        </thead>
        <tbody>
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </section>
  </body>
  <script src="../js/admin.js"></script>
</html>
